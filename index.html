<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ساعة مسجد ذكية</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="clock.css">
     <link rel="icon" type="image/png" href="https://png.pngtree.com/png-vector/20230815/ourmid/pngtree-clock-icon-simple-flat-vector-png-image_9182653.png">
</head>

<body>

<section class="front">

    <button id="fullscreenBtn">⛶ Full Screen</button>

    <!-- الساعة -->
    <div class="clock" id="clock">

        <div class="digital" id="digital"></div>

        <div class="hand hour" id="hour"></div>
        <div class="hand minute" id="minute"></div>
        <div class="hand second" id="second"></div>

        <div class="center"></div>

        <div class="date" id="date"></div>
    </div>

    <!-- الصلاة -->
    <div class="prayer-box">

        <div class="prayer-title">🕌 أوقات الصلاة</div>

        <div class="prayer-row">

            <div class="prayer-card">
                <div id="nextPrayer"></div>
            </div>

            <div class="prayer-card">
                <div id="remainingTime"></div>
            </div>

        </div>

    </div>

</section>
<!-- التطبيقات -->
<section class="google">

    <div class="apps-bar">

        <button class="app-btn" onclick="openApp('radio')">
            <div class="icon">📻</div>
            <div class="title">إذاعة القرآن</div>
        </button>

        <button class="app-btn" onclick="openApp('search')">
            <div class="icon">🔍</div>
            <div class="title">بحث</div>
        </button>

        <button class="app-btn" onclick="openApp('youtube')">
            <div class="icon">▶️</div>
            <div class="title">youtube</div>
        </button>

        <button class="app-btn" onclick="openApp('quran')">
            <div class="icon">📖</div>
            <div class="title">القرآن</div>
        </button>

    </div>

    <div class="google-box">
        <iframe id="googleFrame" src="https://www.google.com/webhp?igu=1"></iframe>
    </div>

</section>
<video autoplay muted loop playsinline
       style="position:fixed;bottom:0;right:cal(50%-170px);width:170px; ">
    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
</video>

<script src="clock.js"></script>

</body>
</html>
