<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ساعة حائط فخمة</title>

    <link rel="stylesheet" href="clock.css">
    <link rel="icon" type="image/png" href="https://png.pngtree.com/png-vector/20240413/ourmid/pngtree-clock-icon-with-arrows-pointer-vector-for-your-web-and-mobile-png-image_12277196.png">
</head>

<body>

    <section class="front">
        <!-- زر ملء الشاشة -->
        <button id="fullscreenBtn">⛶ Full Screen</button>

        <!-- الساعة -->
        <div class="clock" id="clock">

            <div class="digital" id="digital"></div>

            <div class="hand hour" id="hour"></div>
            <div class="hand minute" id="minute"></div>
            <div class="hand second" id="second"></div>

            <div class="center"></div>

            <div class="date" id="date"></div>

        </div>
    </section>
    <section class="google">
        <!-- Google تحت الساعة -->
        <div class="google-box">
            <iframe 
                src="https://www.google.com/webhp?igu=1"
                id="googleFrame">
            </iframe>
        </div>
    </section>
<script src="clock.js"></script>

</body>
</html>
